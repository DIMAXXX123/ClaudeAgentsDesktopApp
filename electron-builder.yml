appId: com.dima.ultronos
productName: Ultronos
copyright: Copyright © 2026 Dima

directories:
  output: dist
  buildResources: resources

files:
  - dist-electron/**/*
  - renderer/.next/standalone/**/*
  - renderer/.next/static/**/*
  - renderer/public/**/*
  - package.json
  - "!**/*.map"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/*.d.ts"

extraResources:
  - from: renderer/.next/static
    to: app/renderer/.next/static
  - from: renderer/public
    to: app/renderer/public

asar: true
asarUnpack:
  - "**/node_modules/**/*.node"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  artifactName: "${productName}-Setup-${version}.${ext}"

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
  icon: resources/icon.icns

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
  icon: resources/icon.png
